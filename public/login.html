<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Control de Servicio Social</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <!-- LEFT SIDE -->
      <div class="login-left">
        <div class="brand">
          <h1>CSS Control</h1>
          <p>Control de Servicio Social</p>
        </div>

        <div class="welcome-text">
          <h2>Bienvenido 👋</h2>
          <p>
            Inicia sesión para acceder a tu panel de control y monitorear tu
            progreso en tiempo real.
          </p>
        </div>
      </div>

      <div class="login-right">
        <form id="loginForm" class="login-box">
          <h2>Iniciar Sesión</h2>
          <p>Ingresa tus datos para continuar</p>

          <div class="input-group">
            <label for="email">Correo</label>
            <input
              type="email"
              id="email"
              placeholder="ejemplo@email.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              placeholder="********"
              required
            />
          </div>

          <!-- BOTÓN LOGIN -->
          <button type="submit" class="btn-login">Entrar</button>

          <!-- BOTÓN REGISTRAR (NO submit) -->
          <button type="button" id="btnRegistrar" class="btn-register">
            Registrarse
          </button>
        </form>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
